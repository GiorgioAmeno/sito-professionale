<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Fotografico</title>

<style>

/* RESET */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

header h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 2px;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-size: 14px;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('foto1.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero h2 {
    font-size: 60px;
    text-align: center;
    background: rgba(0,0,0,0.4);
    padding: 20px 40px;
}

/* GALLERIA */
.gallery {
    padding: 80px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
}

.gallery img {
    width: 100%;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    opacity: 0.8;
}

/* ABOUT */
.about {
    padding: 80px 20px;
    text-align: center;
    max-width: 800px;
    margin: auto;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #000;
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
}

</style>
</head>

<body>

<header>
    <h1>IL TUO NOME</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Galleria</a>
        <a href="#">Contatti</a>
    </nav>
</header>

<section class="hero">
    <h2>Raccontare storie attraverso la luce</h2>
</section>

<section class="gallery">
    <img src="foto1.jpg" onclick="apriLightbox(this)">
    <img src="foto2.jpg" onclick="apriLightbox(this)">
    <img src="foto3.jpg" onclick="apriLightbox(this)">
    <img src="foto4.jpg" onclick="apriLightbox(this)">
</section>

<section class="about">
    <h2>Chi sono</h2>
    <p>
    Fotografo specializzato in ritratti e fotografia artistica.
    Ogni immagine è un frammento di storia, un momento irripetibile.
    </p>
</section>

<footer>
    <p>© 2026 - Il tuo nome</p>
</footer>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="chiudiLightbox()">
    <img id="imgLightbox">
</div>

<script>

function apriLightbox(img) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("imgLightbox").src = img.src;
}

function chiudiLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
